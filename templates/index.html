<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Contact - Local Portal</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css" />
  </head>
  <body class="bg-gray-900 text-white font-sans">
    <div
      class="bg-red-600 text-center py-2 px-4 font-bold animate-pulse text-sm"
    >
       SYSTEM OFFLINE: Local Disaster Network Active
    </div>

    <div class="max-w-md mx-auto my-6 p-4 bg-gray-800 rounded-lg shadow-lg">
      <h2 class="text-xl font-bold mb-2">Local Mesh Chat</h2>

      <div class="mb-3">
        <input
          id="username"
          type="text"
          placeholder="Enter your name..."
          class="w-full p-2 rounded bg-gray-700 text-white text-sm focus:outline-none border border-gray-600 focus:border-blue-500"
        />
      </div>

      <div
        id="chat-box"
        class="h-64 overflow-y-auto bg-gray-700 p-3 rounded mb-4 text-sm"
      ></div>

      <div class="flex gap-2">
        <input
          id="msg-input"
          type="text"
          placeholder="Type message..."
          class="flex-1 p-2 rounded bg-gray-600 text-white focus:outline-none"
        />
        <button
          id="send-btn"
          class="bg-blue-600 px-4 py-2 rounded font-bold hover:bg-blue-700"
        >
          Send
        </button>
      </div>
    </div>

    <script src="/static/js/socket.io.min.js"></script>
    <script>
      // 1. Local server se automatically connect karo
      const socket = io();

      // 2. UI Elements ko target karo
      const chatBox = document.getElementById("chat-box");
      const msgInput = document.getElementById("msg-input");
      const sendBtn = document.getElementById("send-btn");
      const usernameInput = document.getElementById("username");

      // 3. MESSAGE BHEJNA (Client -> Server)
      sendBtn.addEventListener("click", sendMessage);
      msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      document.getElementById("username");

      function sendMessage() {
        const text = msgInput.value.trim();
        const user = usernameInput.value.trim() || "Anonymous";

        if (text !== "") {
          const payload = {
            sender: user,
            message: text,
            timestamp: new Date().toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            }),
          };

          // Server ko event emit karo
          socket.emit("send_message", payload);
          msgInput.value = ""; // Input clear karo
        }
      }

      // 4. MESSAGE RECEIVE KARNA (Server -> Client)
      socket.on("receive_message", (data) => {
        const messageElement = document.createElement("div");
        messageElement.className =
          "mb-3 p-2 bg-gray-600 rounded shadow-sm border-l-4 border-blue-500";

        messageElement.innerHTML = `
                <div class="flex justify-between text-xs text-gray-400 font-semibold mb-1">
                    <span>${data.sender}</span>
                    <span>${data.timestamp}</span>
                </div>
                <p class="text-sm text-white">${data.message}</p>
            `;

        chatBox.appendChild(messageElement);
        chatBox.scrollTop = chatBox.scrollHeight;
      });
    </script>
  </body>
</html>
