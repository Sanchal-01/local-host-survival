<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Contact - Local Portal</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css" />
  </head>
  <body class="bg-gray-900 text-white font-sans">
    <div
      class="bg-red-600 text-center py-2 px-4 font-bold animate-pulse text-sm"
    >
      SYSTEM OFFLINE: Local Disaster Network Active
    </div>

    <div class="max-w-md mx-auto my-6 p-4 bg-gray-800 rounded-lg shadow-lg">
      <h2 class="text-xl font-bold mb-2">Local Mesh Chat</h2>

      <div class="mb-3">
        <input
          id="username"
          type="text"
          placeholder="Enter your name..."
          class="w-full p-2 rounded bg-gray-700 text-white text-sm focus:outline-none border border-gray-600 focus:border-blue-500"
        />
      </div>

      <div
        id="chat-box"
        class="h-64 overflow-y-auto bg-gray-700 p-3 rounded mb-4 text-sm"
      ></div>

      <div class="flex gap-2">
        <input
          id="msg-input"
          type="text"
          placeholder="Type message..."
          class="flex-1 p-2 rounded bg-gray-600 text-white focus:outline-none"
        />
        <button
          id="send-btn"
          class="bg-blue-600 px-4 py-2 rounded font-bold hover:bg-blue-700"
        >
          Send
        </button>
        <button
          id="broadcast-btn"
          class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded shadow mt-2"
        >
          ⚠️ Broadcast Emergency Alert
        </button>
      </div>
    </div>

    <script src="/static/js/socket.io.min.js"></script>
    <script>
      // 1. WebSocket Engine Initialization (Establishes local server handshake link)
      const socket = io();

      // 2. DOM Elements Mapping for State Integration
      const chatBox = document.getElementById("chat-box");
      const msgInput = document.getElementById("msg-input");
      const sendBtn = document.getElementById("send-btn");
      const usernameInput = document.getElementById("username");

      // 3. ACTION EVENT LISTENERS: Capture dispatch triggers
      sendBtn.addEventListener("click", sendMessage);
      msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage(); // Keyboard interface handler
      });

      // 4. DATA TRANSMISSION LOGIC: Bundles and transmits active payload structure
      function sendMessage() {
        const text = msgInput.value.trim();
        const user = usernameInput.value.trim() || "Anonymous";

        if (text !== "") {
          // Standard Data Scheme shared with Backend (Member 1) & Database (Member 2)
          const payload = {
            sender: user,
            message: text,
            timestamp: new Date().toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            }),
          };

          // Broadcast Outward: Emits structural object packet upstream via Socket
          socket.emit("send_message", payload);
          msgInput.value = ""; // Clear execution frame input buffer
        }
      }

      // 5. DATA INGESTION ENGINE: Listens for downstream data broadcasted from Flask
      socket.on("receive_message", (data) => {
        // Construct visual element payload card
        const messageElement = document.createElement("div");
        messageElement.className =
          "mb-3 p-2 bg-gray-600 rounded shadow-sm border-l-4 border-blue-500";

        // Dynamic HTML injection framing incoming values
        messageElement.innerHTML = `
                <div class="flex justify-between text-xs text-gray-400 font-semibold mb-1">
                    <span>${data.sender}</span>
                    <span>${data.timestamp}</span>
                </div>
                <p class="text-sm text-white">${data.message}</p>
            `;

        // Append UI frame inside the viewport node
        chatBox.appendChild(messageElement);

        // Dynamic Autoscroll: Locks chat view window viewport down to latest message
        chatBox.scrollTop = chatBox.scrollHeight;
      });

      const broadcastBtn = document.getElementById("broadcast-btn");

      broadcastBtn.addEventListener("click", () => {
        const text = msgInput.value.trim();
        if (text !== "") {
          socket.emit("send_broadcast", {
            message: text,
            timestamp: new Date().toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            }),
          });
          msgInput.value = "";
        }
      });

      socket.on("receive_broadcast", (data) => {
        const banner = document.querySelector(".bg-red-600");
        banner.innerText = `🚨 ALERT (${data.timestamp}): ${data.message}`;
        banner.classList.add("bg-red-700", "text-xl"); // Make it prominent
      });
    </script>
  </body>
</html>
