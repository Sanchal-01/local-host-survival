<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Contact - Local Portal</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css" />
  </head>
  <body class="bg-gray-900 text-white font-sans">
    <div
      class="bg-red-600 text-center py-2 px-4 font-bold animate-pulse text-sm"
    >
      SYSTEM OFFLINE: Local Disaster Network Active
    </div>

    <div class="max-w-md mx-auto my-6 p-4 bg-gray-800 rounded-lg shadow-lg">
      <h2 class="text-xl font-bold mb-2">Local Mesh Chat</h2>

      <div class="mb-3">
        <input
          id="username"
          type="text"
          placeholder="Enter your name..."
          class="w-full p-2 rounded bg-gray-700 text-white text-sm focus:outline-none border border-gray-600 focus:border-blue-500"
        />
      </div>

      <div
        id="chat-box"
        class="h-64 overflow-y-auto bg-gray-700 p-3 rounded mb-4 text-sm"
      ></div>

      <div class="flex gap-2">
        <input
          id="msg-input"
          type="text"
          placeholder="Type message..."
          class="flex-1 p-2 rounded bg-gray-600 text-white focus:outline-none"
        />
        <button
          id="send-btn"
          class="bg-blue-600 px-4 py-2 rounded font-bold hover:bg-blue-700"
        >
          Send
        </button>
        <button
          id="broadcast-btn"
          class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded shadow mt-2"
        >
          ⚠️ Broadcast Emergency Alert
        </button>
      </div>
    </div>

    <script src="/static/js/socket.io.min.js"></script>
    <script>
      // 1. WebSocket Engine Initialization
      const socket = io();

      // 2. DOM Elements Mapping
      const chatBox = document.getElementById("chat-box");
      const msgInput = document.getElementById("msg-input");
      const sendBtn = document.getElementById("send-btn");
      const usernameInput = document.getElementById("username");
      const broadcastBtn = document.getElementById("broadcast-btn"); // Broadcast button link

      // ========================================================
      // 1. CHAT HISTORY ENGINE (Database Persistence)
      // ========================================================

      // Connection hote hi purani chat history mango
      socket.emit("request_chat_history");

      // History receive karke screen par render karo
      socket.on("chat_history", function (history) {
        chatBox.innerHTML = ""; // Reconnect par duplicates rokne ke liye
        history.forEach(function (message) {
          displayMessage(
            message.sender,
            message.text,
            message.is_broadcast,
            message.timestamp,
          );
        });
      });

      // ========================================================
      // 2. REUSABLE RENDERING ENGINE (UI Display)
      // ========================================================
      function displayMessage(sender, text, isBroadcast, timestamp) {
        const messageElement = document.createElement("div");

        // Styling Switch: Alert ke liye Red, Normal ke liye Blue border
        if (isBroadcast) {
          messageElement.className =
            "mb-3 p-2 bg-red-900/30 rounded shadow-sm border-l-4 border-red-500 animate-pulse";
        } else {
          messageElement.className =
            "mb-3 p-2 bg-gray-600 rounded shadow-sm border-l-4 border-blue-500";
        }

        messageElement.innerHTML = `
        <div class="flex justify-between text-xs text-gray-400 font-semibold mb-1">
            <span class="${isBroadcast ? "text-red-400" : ""}">
                ${sender} ${isBroadcast ? "🚨 [ALERT]" : ""}
            </span>
            <span>${timestamp}</span>
        </div>
        <p class="text-sm text-white">${text}</p>
    `;

        chatBox.appendChild(messageElement);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
      }

      // ========================================================
      // 3. NORMAL CHAT LOGIC (Send/Receive)
      // ========================================================
      sendBtn.addEventListener("click", sendMessage);
      msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      function sendMessage() {
        const text = msgInput.value.trim();
        const user = usernameInput.value.trim() || "Anonymous";

        if (text !== "") {
          const payload = {
            sender: user,
            message: text,
            is_broadcast: false,
            timestamp: new Date().toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            }),
          };
          socket.emit("send_message", payload);
          msgInput.value = "";
        }
      }

      // Live normal message incoming hook
      socket.on("receive_message", (data) => {
        displayMessage(
          data.sender,
          data.message || data.text,
          data.is_broadcast || false,
          data.timestamp,
        );
      });

      // ========================================================
      // 4. EMERGENCY BROADCAST LOGIC (Fix: Wapas Joda Hai)
      // ========================================================

      // Outgoing Broadcast: Jab alert button click hoga
      if (broadcastBtn) {
        broadcastBtn.addEventListener("click", () => {
          const text = msgInput.value.trim();
          const user = usernameInput.value.trim() || "System Admin";

          if (text !== "") {
            const payload = {
              sender: user,
              message: text,
              is_broadcast: true, // Yeh database mein alert bankar save hoga
              timestamp: new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              }),
            };
            socket.emit("send_broadcast", payload);
            msgInput.value = "";
          }
        });
      }

      // Incoming Broadcast: Top banner ko live update karne ke liye
      socket.on("receive_broadcast", (data) => {
        // Top red flashing banner ka text change karo
        const topBanner = document.querySelector(".bg-red-600");
        if (topBanner) {
          topBanner.innerText = `🚨 ALERT (${data.timestamp}): ${data.message}`;
          topBanner.className =
            "bg-red-700 text-center py-3 px-4 font-bold animate-bounce text-base sticky top-0 z-50 transition-all duration-300";
        }

        // Alert message ko chat box ke andar bhi laal rang mein insert karo
        displayMessage(data.sender, data.message, true, data.timestamp);
      });
    </script>
  </body>
</html>
